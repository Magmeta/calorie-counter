spring:
  application:
    name: calorie-counter

  datasource:
    url: jdbc:postgresql://localhost:5432/calorie_counter
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

logging:
  level:
    com.caloriecounter.security: DEBUG
  file:
    name: logs/app.log

app:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-for-development-only-change-in-production}
    expiration-ms: 86400000
  ai:
    provider: ${AI_PROVIDER:gemini}
    claude:
      api-key: ${CLAUDE_API_KEY:}
      model: claude-sonnet-4-6-20250514
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: gemini-2.5-flash
  usda:
    api-key: ${USDA_API_KEY:DEMO_KEY}